name: Update Power Data

on:
  schedule:
    # Executa a cada 1 hora
    - cron: '0 * * * *'
  # Permite executar manualmente
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run export script
        run: |
          python export_power.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add power_export.csv docs/power_export.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: atualizar dados de poder - $(date -u +'%Y-%m-%d %H:%M:%S UTC')" && git push)
