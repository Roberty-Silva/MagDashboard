<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Calculador de Poder — Exportador</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <img src="./logo.jpg" alt="Magnum of Spades" class="logo">
      <div class="header-text">
        <h1>⚡ Calculador de Poder</h1>
        <p>Tribo Magnum of Spades</p>
      </div>
    </div>
  </header>

  <main>
    <section>      <h2>📈 Histórico de Poder</h2>
      <p id="chart-status">Carregando gráfico...</p>
      <canvas id="powerChart" width="800" height="400"></canvas>
    </section>
  </main>
      <ul>
        <li>💻 <a href="../export_power.py">Script Python</a> — export_power.py</li>
        <li>📦 <a href="../requirements.txt">Dependências</a> — requirements.txt</li>
        <li>📊 <a href="./power_export.csv">Dados Exportados</a> — power_export.csv</li>
      </ul>
    </section>
  </main>

  <footer>
    <p>⚡ <strong>MagDashboard</strong> — Calculador de Poder em Tempo Real | Dados atualizados automaticamente</p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    async function fetchCsv() {
      const candidates = [
        'power_export.csv',
        '../power_export.csv',
        '/power_export.csv'
      ];
      for (const url of candidates) {
        try {
          const urlWithCache = url + '?t=' + Date.now();
          const res = await fetch(urlWithCache, { cache: 'no-store' });
          if (!res.ok) continue;
          const text = await res.text();
          return text;
        } catch (e) {
          console.log('Tentando próxima localização:', url);
        }
      }
      throw new Error('CSV não encontrado nas localizações esperadas.');
    }

    function parseCsv(text) {
      const lines = text.split(/\r?\n/).filter(Boolean);
      if (lines.length < 2) return [];
      
      const header = lines[0].split(',').map(h => h.trim().replace(/^\"|\"$/g, ''));
      const powerIdx = header.findIndex(h => h.toLowerCase() === 'power');
      const codeIdx = header.findIndex(h => h.toLowerCase() === 'code');
      const dateIdx = header.findIndex(h => h.toLowerCase().includes('extraction_date'));
      
      if (powerIdx === -1 || codeIdx === -1 || dateIdx === -1) {
        console.log('Headers encontrados:', header);
        console.log('powerIdx:', powerIdx, 'codeIdx:', codeIdx, 'dateIdx:', dateIdx);
        return [];
      }
      
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        
        const cols = line.split(',');
        const rawPower = cols[powerIdx] ? cols[powerIdx].replace(/\"/g,'').trim() : '';
        const code = cols[codeIdx] ? cols[codeIdx].replace(/\"/g,'').trim() : '';
        const date = cols[dateIdx] ? cols[dateIdx].replace(/\"/g,'').trim() : '';
        
        const power = parseInt((rawPower || '').toString().replace(/[^0-9]/g, '')) || 0;
        if (power > 0 && code && date) {
          rows.push({ code, power, date });
        }
      }
      return rows;
    }

    function formatCode(code) {
      // Transforma "ptb_magnumofspades" em "MagnumOfSpades"
      if (code.toLowerCase().includes('magnum')) {
        return 'MagnumOfSpades';
      }
      return code;
    }

    function formatDate(dateStr) {
      try {
        const date = new Date(dateStr);
        const day = String(date.getDate()).padStart(2, '0');
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const year = date.getFullYear();
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        const seconds = String(date.getSeconds()).padStart(2, '0');
        return `${day}-${month}-${year} ${hours}:${minutes}:${seconds}`;
      } catch (e) {
        return dateStr;
      }
    }

    function createLineChart(rows) {
      if (!rows.length) return null;
      
      const dataByCode = new Map();
      for (const r of rows) {
        if (!dataByCode.has(r.code)) {
          dataByCode.set(r.code, []);
        }
        dataByCode.get(r.code).push({ date: r.date, power: r.power });
      }
      
      const aggregated = new Map();
      for (const [code, items] of dataByCode.entries()) {
        const grouped = new Map();
        for (const item of items) {
          const key = item.date;
          grouped.set(key, (grouped.get(key) || 0) + item.power);
        }
        aggregated.set(code, Array.from(grouped.entries()).sort((a, b) => new Date(a[0]) - new Date(b[0])));
      }
      
      const allDates = new Set();
      for (const items of aggregated.values()) {
        for (const [date] of items) {
          allDates.add(date);
        }
      }
      const sortedDates = Array.from(allDates).sort((a, b) => new Date(a) - new Date(b));
      const formattedLabels = sortedDates.map(d => formatDate(d));
      
      const colors = [
        'rgb(255, 99, 132)',
        'rgb(54, 162, 235)',
        'rgb(75, 192, 192)',
        'rgb(255, 206, 86)',
        'rgb(153, 102, 255)',
        'rgb(255, 159, 64)',
        'rgb(11, 128, 85)',
        'rgb(200, 50, 50)'
      ];
      
      const datasets = [];
      let colorIdx = 0;
      for (const code of aggregated.keys()) {
        const items = aggregated.get(code);
        const dataMap = new Map(items);
        const values = sortedDates.map(d => dataMap.get(d) || 0);
        
        datasets.push({
          label: formatCode(code),
          data: values,
          borderColor: colors[colorIdx % colors.length],
          backgroundColor: colors[colorIdx % colors.length].replace(')', ', 0.1)').replace('rgb', 'rgba'),
          borderWidth: 2,
          fill: false,
          tension: 0.1
        });
        colorIdx++;
      }
      return { labels: formattedLabels, datasets };
    }

    async function draw() {
      const status = document.getElementById('chart-status');
      try {
        const csv = await fetchCsv();
        const rows = parseCsv(csv);
        if (!rows.length) {
          status.textContent = 'CSV encontrado mas sem dados válidos (colunas power/code/extraction_date não detectadas).';
          return;
        }
        const chartData = createLineChart(rows);
        if (!chartData) {
          status.textContent = 'Erro ao processar dados para gráfico de linha.';
          return;
        }
        status.textContent = `Total de registros: ${rows.length} | Timestamps: ${chartData.labels.length} | Códigos: ${chartData.datasets.length}`;
        const ctx = document.getElementById('powerChart').getContext('2d');
        new Chart(ctx, {
          type: 'line',
          data: {
            labels: chartData.labels,
            datasets: chartData.datasets
          },
          options: {
            responsive: true,
            plugins: {
              legend: { display: true },
              title: { display: true, text: 'Evolução de Poder por Código' }
            },
            scales: {
              x: { title: { display: true, text: 'Data e Hora' } },
              y: { beginAtZero: true, title: { display: true, text: 'Soma de Poder' } }
            }
          }
        });
      } catch (err) {
        document.getElementById('chart-status').textContent = 'Erro ao carregar CSV: ' + err.message;
        console.error(err);
      }
    }

    draw();
  </script>
</body>
</html>
